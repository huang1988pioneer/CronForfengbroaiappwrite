name: 鋒兄例行 routine

on:
  schedule:
    # Taiwan (UTC+8): 上午 09:33 add
    - cron: "33 1 * * *"
    # Taiwan (UTC+8): 下午 15:33 add
    - cron: "33 7 * * *"
    # Taiwan (UTC+8): 晚上 21:33 remove
    - cron: "33 13 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "add or remove 鋒兄例行"
        required: true
        default: "add"
        type: choice
        options:
          - add
          - remove

permissions:
  contents: read

concurrency:
  group: feng-routine-cron
  cancel-in-progress: false

jobs:
  toggle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Toggle 鋒兄例行 routine
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_PROJECT_ID }}
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_DATABASE_ID }}
          NEXT_PUBLIC_APPWRITE_API_KEY: ${{ secrets.NEXT_PUBLIC_APPWRITE_API_KEY }}
          # Evening schedule removes one random row; morning/afternoon add one random row.
          ROUTINE_CRON_ACTION: ${{ github.event.inputs.action || (github.event.schedule == '33 13 * * *' && 'remove' || 'add') }}
          APPWRITE_ROUTINE_NAME: 鋒兄例行
          APPWRITE_ROUTINE_COLLECTION_NAME: routine
        run: npm run routine:cron
